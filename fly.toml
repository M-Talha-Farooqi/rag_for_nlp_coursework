# fly.toml app configuration file generated for nlp-assistant on 2026-02-04T00:06:44+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nlp-assistant'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpus = 2
  memory_mb = 4096
